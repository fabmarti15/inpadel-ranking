*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:transparent;color:var(--i)}
.shell{max-width:460px;margin:0 auto;padding:4px 2px 10px}
.loading{max-width:460px;margin:40px auto;text-align:center;color:var(--m);font-weight:800;font-size:.9rem}
.back{max-width:460px;margin:0 auto;padding:12px 14px 0}
.back a{color:var(--g);font-weight:900;text-decoration:none;font-size:.82rem}

.banner{background:#fdeceb;border:1px solid #f3c9c6;color:#b5302a;border-radius:12px;padding:11px 13px;font-size:.8rem;font-weight:800;margin-bottom:14px;display:flex;gap:10px;align-items:center;justify-content:space-between}
.banner b{font-weight:950}.banner .x{cursor:pointer;font-weight:900;opacity:.6}

.hero{background:linear-gradient(150deg,#1a7a44,#14653a);color:#fff;border-radius:20px;padding:20px;margin-bottom:16px;box-shadow:0 14px 34px #1a7a4433}
.hero-t{font-size:1.3rem;font-weight:950}
.hero-pot{font-size:.92rem;font-weight:700;margin-top:4px;opacity:.96}
.hero-pot b{font-size:1.15rem;font-weight:950}
.hero-row{display:flex;gap:8px;margin-top:13px;flex-wrap:wrap}
.chip{font-size:.72rem;font-weight:900;border-radius:20px;padding:6px 11px}
.flame{background:#ffffff26;color:#ffe08a}.live{background:#ffffff1f;color:#d6ffe6}.cd{background:#ffffff1f;color:#fff}
.hero-sub{font-size:.72rem;margin-top:12px;opacity:.82}

.card{background:var(--c);border:1px solid var(--l);border-radius:18px;padding:18px;margin-bottom:16px;box-shadow:0 8px 22px #0000000a}
.card-h{font-size:1.05rem;font-weight:950;margin-bottom:4px}
.card-s{font-size:.76rem;color:var(--m);margin-bottom:14px}

.pick-wrap{position:relative}
.pick-in{width:100%;border:2px solid var(--l);border-radius:14px;padding:14px;font:inherit;font-size:.95rem;font-weight:800}
.pick-in:focus{outline:none;border-color:var(--g)}
.pick-sug{position:absolute;left:0;right:0;top:56px;background:#fff;border:1px solid #e0ddd5;border-radius:12px;box-shadow:0 12px 28px #00000022;z-index:8;max-height:260px;overflow-y:auto;display:none}
.pick-sug.show{display:block}
.pick-sug div{padding:12px 14px;font-size:.9rem;font-weight:800;border-bottom:1px solid #f3f0e9;cursor:pointer}
.pick-sug div:last-child{border-bottom:0}
.pick-sug div:active{background:#1a7a440a}

.mkt{margin-bottom:18px}
.mkt-t{font-size:1rem;font-weight:950;margin-bottom:6px}
.seclbl{font-size:.68rem;font-weight:900;color:#b3b0aa;text-transform:uppercase;letter-spacing:.04em;margin:12px 0 7px}
.opt{position:relative;display:flex;justify-content:space-between;align-items:center;background:#fff;border:1px solid var(--l);border-radius:12px;padding:9px 13px;margin-bottom:6px;cursor:pointer;transition:.12s}
.opt:active{transform:scale(.98)}
.opt.sel{border-color:var(--g);background:#1a7a440a;box-shadow:0 6px 16px #1a7a4422}
.opt .nm{font-size:.8rem;font-weight:800;color:#2a2a2a}
.opt.sel .nm{color:var(--g)}
.opt .c{font-size:.82rem;font-weight:950;color:#777;background:#f0efe9;border-radius:8px;padding:3px 8px}
.opt.sel .c{background:var(--g);color:#fff}

.opt.sel .check{display:flex}
.otro{width:100%;background:#1a7a440d;border:2px solid var(--g);color:var(--g);border-radius:14px;padding:15px;font:inherit;font-weight:950;font-size:.98rem;cursor:pointer;margin:0 0 12px;box-shadow:0 5px 14px #1a7a4426}
.srch{position:relative;display:none;margin:0 0 10px}
.srch.open{display:block}
.srch input{width:100%;border:2px solid var(--l);border-radius:12px;padding:12px;font:inherit;font-size:.88rem}
.srch input:focus{outline:none;border-color:var(--g)}

.cta.ghost{background:#fff;color:var(--g);border:2px solid var(--g);box-shadow:none}

.lrow b{font-weight:850}.lrow .p{color:var(--g);font-weight:950}

.admin{background:#1d1d1b;color:#fff;border-radius:16px;padding:16px;margin-bottom:16px}
.admin h3{margin:0 0 10px;font-size:.95rem}
.admin input{width:100%;padding:11px;border-radius:10px;border:0;font:inherit;margin-bottom:9px}

.dwrap{margin-top:2px}
.dmk{font-size:.9rem;font-weight:950;margin:2px 0 10px}
.drow{margin-bottom:10px}
.dtop{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}

.dfill{height:100%;background:var(--g);border-radius:6px}

.lb-sub{font-size:.74rem;color:var(--m);font-weight:700;margin:-2px 0 12px}

/* ===== helpers ===== */
function r1(x){return Math.round(x*10)/10;}
function nextClose(){var now=new Date(),d=new Date(now);d.setHours(21,0,0,0);var add=(3-d.getDay()+7)%7;if(add===0&&now.getTime()>d.getTime())add=7;d.setDate(d.getDate()+add);return d;}
function roundId(){var d=nextClose();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function closed(){return Date.now()>=nextClose().getTime()}
function cdText(){var ms=nextClose().getTime()-Date.now();if(ms<=0)return'cerrada';var h=Math.floor(ms/3.6e6),m=Math.floor(ms%3.6e6/6e4),d=Math.floor(h/24);return d>=1?('cierra en '+d+'d '+(h-d*24)+'h'):('cierra en '+h+'h '+m+'m');}
function cdHuman(){var ms=nextClose().getTime()-Date.now();if(ms<=0)return'cerrada';var m=Math.floor(ms/6e4),h=Math.floor(m/60),d=Math.floor(h/24);if(d>=1)return'faltan '+d+(d===1?' día':' días');if(h>=1)return'faltan '+h+' h';return'faltan '+m+' min';}

/* ===== cuotas automáticas por EFECTIVIDAD histórica =====
   Orden por efectividad ajustada (shrinkage para pocas fechas, K_EF).
   Curva suave: piso x1.6, techo x50 solo para ~10% del fondo. */
var _EFS=PLAYERS.filter(function(p){return p[2]>=1}).map(function(p){return p[3]});
var PRIOR_EF=_EFS.reduce(function(a,b){return a+b},0)/(_EFS.length||1), K_EF=4;
function adjEf(ef,fj){return (ef*fj+PRIOR_EF*K_EF)/(fj+K_EF);}
function makeCuota(n){var MIN=1.6,MAX=50,F=0.10,cap=Math.max(1,Math.floor(n*(1-F))),g=Math.pow(MAX/MIN,1/cap);return function(r){return Math.min(MAX,Math.round(MIN*Math.pow(g,r)*10)/10);};}
function buildMarket(order){
  var arr=PLAYERS.filter(function(p){return p[2]>=1}).slice();
  arr.sort(function(a,b){var aa=adjEf(a[3],a[2]),bb=adjEf(b[3],b[2]);return order==='oro'?bb-aa:aa-bb;});
  var cuota=makeCuota(arr.length),cu={};arr.forEach(function(p,i){cu[p[0]]=cuota(i);});
  var fav=arr.slice(0,3).map(function(p){return {n:p[0],c:cu[p[0]]}});
  var bomb=[6,9,13].filter(function(i){return i<arr.length}).map(function(i){return {n:arr[i][0],c:cu[arr[i][0]]}});
  return {cuota:cu,favoritos:fav,bombazos:bomb};
}

var LKEY='polla_local_v2';

  async init(){this.s=JSON.parse(localStorage.getItem(LKEY)||'{}');if(this.s.points==null)this.s.points=0;if(this.s.streak==null)this.s.streak=0;},
  _save(){localStorage.setItem(LKEY,JSON.stringify(this.s));},

  async leaderboard(){var list=POLLEROS.map(function(p){return [p[0],p[1]]});var self=this.s;if(self.name){var me=null;for(var i=0;i<list.length;i++)if(list[i][0]===self.name)me=list[i];if(me)me[1]=r1(me[1]+self.points);else if(self.points>0)list.push([self.name,r1(self.points)]);}list.sort(function(a,b){return b[1]-a[1]});return list;},
  async getRound(round){return {result:this.s.result||null,settled:!!this.s.result};},
  async settle(round,result){var b=this.s.bet||{};var g=gainFrom(b,result);this.s.points=r1(this.s.points+g);this.s.streak=g>0?this.s.streak+1:0;this.s.result=result;this._save();},
  async setImpostor(){this.s.impostor=true;this._save();},
  async clearImpostor(){this.s.impostor=false;this._save();},
  async reset(){localStorage.removeItem(LKEY);this.s={points:0,streak:0};this._save();},
  async nextRound(){this.s.bet=null;this.s.result=null;this._save();}
};

var FbStore={mode:'fb',
  async init(){
    var a=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js');
    var f=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
    this.app=a.initializeApp(FB);this.db=f.getFirestore(this.app);this.f=f;
  },
  async getPlayer(){var f=this.f;var s=await f.getDoc(f.doc(this.db,'players',deviceId()));return s.exists()?{name:s.data().name||null,points:s.data().points||0,streak:s.data().streak||0}:{name:null,points:0,streak:0};},
  async register(name){var f=this.f;await f.setDoc(f.doc(this.db,'players',deviceId()),{name:name,updated:Date.now()},{merge:true});},
  async impostorCount(name){var f=this.f;var q=f.query(f.collection(this.db,'players'),f.where('name','==',name));var c=await f.getCountFromServer(q);return c.data().count;},
  async getMyBet(round){var f=this.f;var s=await f.getDoc(f.doc(this.db,'bets',round+'__'+deviceId()));return s.exists()?s.data():null;},
  async saveBet(round,bet){var f=this.f;var p=await this.getPlayer();await f.setDoc(f.doc(this.db,'bets',round+'__'+deviceId()),{round:round,deviceId:deviceId(),name:p.name,oro:bet.oro,chupa:bet.chupa,ts:Date.now()});},
  async counts(round){var f=this.f;var q=f.query(f.collection(this.db,'bets'),f.where('round','==',round));var c=await f.getCountFromServer(q);return c.data().count;},
  async distribution(round){var f=this.f;var snap=await f.getDocs(f.query(f.collection(this.db,'bets'),f.where('round','==',round)));var o={},c={},t=0;snap.forEach(function(d){var x=d.data();t++;if(x.oro&&x.oro.n)o[x.oro.n]=(o[x.oro.n]||0)+1;if(x.chupa&&x.chupa.n)c[x.chupa.n]=(c[x.chupa.n]||0)+1;});return {oro:o,chupa:c,total:t};},
  async leaderboard(){var f=this.f;var q=f.query(f.collection(this.db,'players'),f.orderBy('points','desc'),f.limit(20));var snap=await f.getDocs(q);var out=[];snap.forEach(function(d){var x=d.data();if(x.name)out.push([x.name,r1(x.points||0)]);});return out;},
  async getRound(round){var f=this.f;var s=await f.getDoc(f.doc(this.db,'rounds',round));return s.exists()?{result:s.data().result||null,settled:!!s.data().settled}:{result:null,settled:false};},
  async settle(round,result){var f=this.f,db=this.db;
    var snap=await f.getDocs(f.query(f.collection(db,'bets'),f.where('round','==',round)));
    var arr=[];snap.forEach(function(d){arr.push(d.data());});
    for(var i=0;i<arr.length;i++){var b=arr[i],g=gainFrom(b,result);
      var pref=f.doc(db,'players',b.deviceId);var ps=await f.getDoc(pref);var pd=ps.exists()?ps.data():{points:0,streak:0};
      await f.setDoc(pref,{points:r1((pd.points||0)+g),streak:g>0?((pd.streak||0)+1):0},{merge:true});}
    await f.setDoc(f.doc(db,'rounds',round),{result:result,settled:true,closesAt:nextClose().toISOString()},{merge:true});
  }
};
var STORE = FB ? FbStore : LocalStore;

/* ===================================================================
   UI
   =================================================================== */
var app=document.getElementById('app'),draft={},CTX={},editingBet=false;
function isAdmin(){return location.hash==='#admin';}
function impDismissed(n){try{return localStorage.getItem('polla_imp_off')===n}catch(e){return false}}
function setImpDismissed(n){try{localStorage.setItem('polla_imp_off',n)}catch(e){}}

async function draw(){
  var player=await STORE.getPlayer();
  var round=roundId();
  var myBet=player.name?await STORE.getMyBet(round):null;
  var roundInfo=await STORE.getRound(round);
  var dist=await STORE.distribution(round);
  var cnt=dist.total;
  var lb=await STORE.leaderboard();
  var impostor=player.name?(((await STORE.impostorCount(player.name))>1)&&!impDismissed(player.name)):false;
  if(myBet)draft={oro:myBet.oro,chupa:myBet.chupa};
  var gain=(roundInfo.settled&&myBet)?gainFrom(myBet,roundInfo.result):0;
  CTX={player:player,round:round,myBet:myBet,roundInfo:roundInfo,cnt:cnt,dist:dist,lb:lb,impostor:impostor,gain:gain};

  var h='';
  if(impostor)h+='<div class="banner"><span>⚠️ Detectamos <b>2 personas</b> jugando como <b>'+player.name+'</b>. Si no eres tú, avisa al organizador.</span><span class="x" id="bx">✕</span></div>';
  if(isAdmin())h+=adminCard();
  if(!player.name)h+=nameCard();
  else if(roundInfo.settled){h+=distCard();h+=resultCard();}
  else if(closed()){h+=distCard();h+=closedCard();}
  else if(myBet){h+=distCard();h+=(editingBet?betCard():betPlacedCard());}
  else {h+=lockedTeaser();h+=betCard();}
  h+=leaderboardCard();
  h+=datosStrip();
  app.innerHTML=h;
  wire();
}
function nameCard(){return '<div class="card"><div class="card-h">👋 ¿Quién eres?</div><div class="card-s">Elige tu nombre para jugar tu polla. Sin clave.</div><div class="pick-wrap"><input class="pick-in" id="pick" placeholder="🔍 escribe tu nombre…" autocomplete="off"><div class="pick-sug" id="picksug"></div></div></div>';}
function optHTML(market,o){var sel=draft[market]&&draft[market].n===o.n?' sel':'';return '<div class="opt'+sel+'" data-n="'+o.n+'" data-c="'+o.c+'"><span class="nm">'+o.n+'</span><span class="c">x'+o.c.toFixed(1)+'</span><span class="check">✓</span></div>';}
function mktHTML(market){var meta=MKMETA[market],M=MK[market],dr=draft[market],shown=shownOf(market);var all=M.favoritos.concat(M.bombazos);var extra='';if(dr&&!shown[dr.n])extra='<div class="seclbl">Tu elección</div><div class="opt sel" data-n="'+dr.n+'" data-c="'+dr.c+'"><span class="nm">'+dr.n+'</span><span class="c">x'+dr.c.toFixed(1)+'</span><span class="check">✓</span></div>';return '<div class="mkt" data-market="'+market+'"><div class="mkt-t">'+meta.ic+' '+meta.t+'</div><button class="otro" data-otro>🔍 Buscar otro jugador</button><div class="srch"><input placeholder="escribe un nombre…" autocomplete="off"><div class="sug"></div></div>'+extra+all.map(function(o){return optHTML(market,o)}).join('')+'</div>';}
function betCard(){var edit=CTX.myBet?' · ✏️ puedes editar hasta las 21:00':'';return '<div class="card"><div class="card-h">Tu polla · '+CTX.player.name+'</div><div class="card-s">Elige en los 2 mercados. Cada acierto paga su cuota en puntos.'+edit+'</div>'+mktHTML('oro')+mktHTML('chupa')+'<div class="anon">🔒 Tu apuesta es anónima — nadie sabrá nunca a quién le apostaste.</div><button class="cta" id="send">'+(CTX.myBet?'✅ Guardar cambios':'✅ Enviar mi polla')+'</button>'+(CTX.myBet?'<button class="cta ghost" id="cancel-edit" style="margin-top:8px">Cancelar</button>':'')+(CTX.player.streak>0?'<div class="streaknote">🔥 Llevas '+CTX.player.streak+' fechas seguidas acertando — no la cortes</div>':'')+'</div>';}
function betPlacedCard(){var b=CTX.myBet||{};return '<div class="card"><div class="card-h">✅ Ya apostaste · '+CTX.player.name+'</div><div class="card-s">Tu polla quedó registrada. La puedes cambiar hasta el miércoles 21:00.</div><div class="locked"><div class="lr">🥇 Copa Oro <b>'+fmtBet(b.oro)+'</b></div><div class="lr">💩 Rey Chupa <b>'+fmtBet(b.chupa)+'</b></div></div><div class="anon" style="margin-top:12px">🔒 Anónima — nadie sabe a quién le apostaste.</div><button class="cta ghost" id="edit-bet" style="margin-top:10px">✏️ Editar mi polla</button>'+(CTX.player.streak>0?'<div class="streaknote">🔥 Llevas '+CTX.player.streak+' fechas seguidas acertando</div>':'')+'</div>';}
function closedCard(){var b=CTX.myBet;return '<div class="card"><div class="card-h">⏱️ Polla cerrada</div><div class="card-s">El americano ya empezó. '+(b?'Esta fue tu polla:':'No alcanzaste a jugar esta fecha.')+'</div>'+(b?'<div class="locked"><div class="lr">🥇 Copa Oro <b>'+fmtBet(b.oro)+'</b></div><div class="lr">💩 Rey Chupa <b>'+fmtBet(b.chupa)+'</b></div></div>':'')+'<p style="font-size:.76rem;color:#888;margin:12px 0 0">Cuando carguen el resultado, se paga solo.</p></div>';}
function resultCard(){var r=CTX.roundInfo.result,b=CTX.myBet||{},hitO=b.oro&&b.oro.n===r.oro,hitC=b.chupa&&b.chupa.n===r.chupa,g=CTX.gain,win=g>0;return '<div class="card"><div class="res '+(win?'win':'lose')+'"><div class="big">'+(win?'🎉 +'+r1(g)+' pts':'😵 +0 pts')+'</div>'+(win?'¡Acertaste!':'Esta vez no fue')+'<small>Racha: 🔥 '+CTX.player.streak+' seguidas</small></div><div class="locked"><div class="lr">🥇 Copa Oro · ganó <b>'+r.oro+'</b></div><div class="lr" style="color:#888">tu apuesta: '+fmtBet(b.oro)+' '+(hitO?'✅':'❌')+'</div><div class="lr">💩 Rey Chupa · fue <b>'+r.chupa+'</b></div><div class="lr" style="color:#888">tu apuesta: '+fmtBet(b.chupa)+' '+(hitC?'✅':'❌')+'</div></div></div>';}
function leaderboardCard(){var list=CTX.lb.map(function(p){return [p[0],p[1]]});if(!list.length)return '<div class="card"><div class="lb-h">🏆 Ranking de la Polla</div><div class="card-s" style="margin-top:6px">Aquí van a brillar los mejores apostadores 🔮 — los que le ven el futuro. Aún no hay puntos: se suman cuando se cargue el resultado de la primera fecha.</div></div>';var top=list.slice(0,3),rest=list.slice(3,7);function isMe(n){return CTX.player.name&&n===CTX.player.name}var pod='<div class="podium">'+podCell('🥈',top[1])+podCell('👑',top[0],1)+podCell('🥉',top[2])+'</div>';var rows=rest.map(function(p,i){return '<div class="lrow'+(isMe(p[0])?' me':'')+'"><b>'+(i+4)+'. '+p[0]+'</b><span class="p">'+p[1]+' pts</span></div>'}).join('');return '<div class="card"><div class="lb-h">🏆 Ranking de la Polla</div><div class="lb-sub">Los mejores apostadores · los que le ven el futuro 🔮</div>'+pod+rows+'</div>';}
function podCell(medal,p,first){if(!p)return'<div class="pod"></div>';return '<div class="pod'+(first?' first':'')+'"><div class="medal">'+medal+'</div><div class="pn">'+p[0]+'</div><div class="pp">'+p[1]+'</div></div>';}
function adminCard(){return '<div class="admin"><h3>⚙️ Organizador · cargar resultado</h3><input id="a-oro" list="a-names" placeholder="Campeón Copa Oro"><input id="a-chupa" list="a-names" placeholder="Rey Chupa (último)"><datalist id="a-names">'+NAMES.map(function(n){return '<option value="'+n+'">'}).join('')+'</datalist><button id="a-settle">💰 Liquidar la fecha</button><div class="note">Paga solo a todos según su cuota, actualiza puntos y racha, y revela los resultados.</div></div>';}

function distBars(dist,market){
  var obj=dist[market]||{},total=dist.total||0,cls=market==='chupa'?' chupa':'';
  var rows=Object.keys(obj).map(function(n){return {n:n,ct:obj[n],c:cuotaFor(market,n)}});
  rows.sort(function(a,b){return b.ct-a.ct});
  var top=rows.slice(0,6),rest=rows.slice(6),restCt=rest.reduce(function(s,r){return s+r.ct},0);
  var html='<div class="dwrap"><div class="dmk">'+(market==='oro'?'🥇 Copa Oro':'💩 Rey Chupa')+'</div>';
  html+=top.map(function(r){var pct=Math.round(r.ct/total*100);return '<div class="drow'+cls+'"><div class="dtop"><span><span class="dn">'+r.n+'</span><span class="dc">x'+r.c.toFixed(1)+'</span></span><span class="dp">'+pct+'%</span></div><div class="dtrack"><div class="dfill" style="width:'+pct+'%"></div></div></div>';}).join('');
  if(restCt){var pr=Math.round(restCt/total*100);html+='<div class="drow other'+cls+'"><div class="dtop"><span class="dn">otros</span><span class="dp">'+pr+'%</span></div><div class="dtrack"><div class="dfill" style="width:'+pr+'%"></div></div></div>';}
  return html+'</div>';
}
function distCard(){var d=CTX.dist;if(!d||!d.total)return '';return '<div class="card"><div class="card-h">📊 Cómo va la polla</div><div class="card-s">'+d.total+(d.total===1?' apuesta':' apuestas')+' hasta ahora · 🔒 nadie sabe quién apostó a quién</div>'+distBars(d,'oro')+'<div class="dsep"></div>'+distBars(d,'chupa')+'</div>';}

function lockedTeaser(){return '<div class="card teaser"><div class="tz-ic">🔒</div><div class="tz-t">Pon tu apuesta para ver cómo va la polla</div><div class="tz-s">Primero apuestas, después ves el ranking de apuestas.<br>Y tranquilo: es <b>100% anónimo</b> — nadie sabrá nunca a quién le apostaste.</div></div>';}

function datosStrip(){var c=CTX.cnt,t=c===0?'Nadie ha apostado aún — sé el primero':(c===1?'1 ya apostó esta fecha':c+' ya apostaron esta fecha');return '<div class="datos"><div>🎟️ '+t+'</div><div id="cd-line">Cierra el miércoles 21:00 · '+cdHuman()+'</div></div>';}

/* ===== eventos ===== */
function wire(){
  var bx=document.getElementById('bx');if(bx)bx.addEventListener('click',function(){setImpDismissed(CTX.player.name);draw();});
  var pick=document.getElementById('pick');
  if(pick){var ps=document.getElementById('picksug');
    pick.addEventListener('input',function(){var q=pick.value.trim().toLowerCase();if(!q){ps.classList.remove('show');return;}var ms=NAMES.filter(function(n){return n.toLowerCase().indexOf(q)>=0}).slice(0,10);ps.innerHTML=ms.length?ms.map(function(n){return '<div data-n="'+n+'">'+n+'</div>'}).join(''):'<div style="color:#aaa">Sin resultados</div>';ps.classList.add('show');});
    ps.addEventListener('click',async function(e){var d=e.target.closest('div[data-n]');if(!d)return;await STORE.register(d.dataset.n);draw();});
  }
  document.querySelectorAll('[data-market]').forEach(function(group){
    var market=group.dataset.market;
    group.addEventListener('click',function(e){var opt=e.target.closest('.opt');if(!opt||!group.contains(opt))return;draft[market]={n:opt.dataset.n,c:parseFloat(opt.dataset.c)};group.querySelectorAll('.opt').forEach(function(x){x.classList.remove('sel')});opt.classList.add('sel');updatePot();});
    var otro=group.querySelector('[data-otro]'),srch=group.querySelector('.srch');
    if(otro)otro.addEventListener('click',function(){srch.classList.toggle('open');if(srch.classList.contains('open'))srch.querySelector('input').focus();});
    var inp=srch&&srch.querySelector('input'),sg=srch&&srch.querySelector('.sug');
    if(inp)inp.addEventListener('input',function(){var q=inp.value.trim().toLowerCase();if(!q){sg.classList.remove('show');return;}var shown=shownOf(market);var ms=NAMES.filter(function(n){return !shown[n]&&n.toLowerCase().indexOf(q)>=0}).slice(0,8);sg.innerHTML=ms.length?ms.map(function(n){return '<div data-n="'+n+'">'+n+'<span class="mini">x'+cuotaFor(market,n).toFixed(1)+'</span></div>'}).join(''):'<div style="color:#aaa">Sin resultados</div>';sg.classList.add('show');});
    if(sg)sg.addEventListener('click',function(e){var d=e.target.closest('div[data-n]');if(!d)return;draft[market]={n:d.dataset.n,c:cuotaFor(market,d.dataset.n)};draw();});
  });
  var send=document.getElementById('send');
  if(send)send.addEventListener('click',async function(){if(!draft.oro||!draft.chupa){alert('Elige en los 2 mercados 😉');return;}send.textContent='Guardando…';await STORE.saveBet(CTX.round,{oro:draft.oro,chupa:draft.chupa});alert(CTX.myBet?'¡Cambios guardados! ✅':'¡Polla enviada! 🎟️');editingBet=false;draw();});
  var eb=document.getElementById('edit-bet');if(eb)eb.addEventListener('click',function(){editingBet=true;draw();});
  var ce=document.getElementById('cancel-edit');if(ce)ce.addEventListener('click',function(){editingBet=false;draw();});
  var as=document.getElementById('a-settle');
  if(as)as.addEventListener('click',async function(){var o=document.getElementById('a-oro').value.trim(),c=document.getElementById('a-chupa').value.trim();if(!o||!c){alert('Completa Oro y Rey Chupa');return;}if(!confirm('¿Liquidar con Oro='+o+' / Rey Chupa='+c+'?'))return;as.textContent='Liquidando…';await STORE.settle(CTX.round,{oro:o,chupa:c});alert('Fecha liquidada ✅');draw();});
}
function updatePot(){var send=document.getElementById('send');if(send)send.classList.toggle('ready',!!(draft.oro&&draft.chupa));}


setInterval(function(){var el=document.getElementById('cd-line');if(el)el.textContent='Cierra el miércoles 21:00 · '+cdHuman();},30000);
window.addEventListener('hashchange',draw);
STORE.init().then(draw).catch(function(e){app.innerHTML='<div class="loading">Error al iniciar: '+e.message+'</div>';});
</script>

new MutationObserver(h).observe(document.documentElement,{childList:true,subtree:true,attributes:true});
addEventListener('load',h);addEventListener('resize',h);setInterval(h,700);})();
